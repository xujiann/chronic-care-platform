<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>医疗机构端 · 慢病协同</title>
    <link rel="stylesheet" href="./portal.css" />
    <script src="./auth.js"></script>
    <script>window.HealthCityAuth.requireRole(["institution"])</script>
  </head>
  <body>
    <main class="portal-shell">
      <header class="portal-header">
        <div>
          <span>医疗机构端</span>
          <h1>诊疗协同工作台</h1>
          <p>接收基层转诊、查看授权健康档案、补充电子病历，并与医保结算审核贯通。</p>
        </div>
        <nav>
          <a href="./health-city.html">系统总览</a>
        </nav>
      </header>

      <section class="metric-grid" id="institution-metrics"></section>

      <section class="portal-grid">
        <article class="panel">
          <div class="panel-title">
            <h2>医生账户</h2>
            <span id="doctor-account-count"></span>
          </div>
          <div id="doctor-accounts" class="list compact"></div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>多点执业政策校验</h2>
            <span>国卫医发〔2014〕86号</span>
          </div>
          <div id="multi-practice-policy" class="rules"></div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>医师多点执业</h2>
          <span id="multi-practice-count"></span>
        </div>
        <div id="multi-practice-applications" class="list"></div>
      </section>

      <section class="portal-grid">
        <article class="panel wide">
          <div class="panel-title">
            <h2>协同任务</h2>
            <span id="order-count"></span>
          </div>
          <div id="care-orders" class="list"></div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>授权健康档案</h2>
          </div>
          <div id="authorized-records" class="list compact"></div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>医保贯通提示</h2>
        </div>
        <div id="claim-links" class="claim-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>分级诊疗转诊中心</h2>
          <span id="referral-center-count"></span>
        </div>
        <div id="referral-center" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>预留号源与床位</h2>
          <span>基层转诊优先接诊</span>
        </div>
        <div id="reserved-resources" class="claim-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>档案病历贯通</h2>
          <span id="integrated-profile-count"></span>
        </div>
        <div id="integrated-profiles" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>标准健康档案视图</h2>
          <span id="standard-profile-count"></span>
        </div>
        <div id="standard-profiles" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>授权与审计</h2>
          <span id="audit-link-count"></span>
        </div>
        <div id="institution-audit" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>慢病固定取药协同</h2>
          <span id="pickup-count"></span>
        </div>
        <div id="pickup-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>居民死亡医学证明办理</h2>
          <span id="death-certificate-count"></span>
        </div>
        <div id="death-certificate-metrics" class="claim-grid"></div>
        <div id="death-certificate-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>出生医学证明办理</h2>
          <span id="birth-certificate-count"></span>
        </div>
        <div id="birth-certificate-metrics" class="claim-grid"></div>
        <div id="birth-certificate-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>死亡证明材料清单</h2>
          <span>电子证照、纸质版、委托书、申报单</span>
        </div>
        <div id="death-certificate-forms" class="claim-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>出生证明材料与证件管理</h2>
          <span>首次签发、换发补发、空白证件、废证登记</span>
        </div>
        <div id="birth-certificate-forms" class="claim-grid"></div>
      </section>
    </main>

    <script src="./health-archive-standard.js"></script>
    <script src="./shared.js"></script>
    <script src="./institution.js"></script>
  </body>
</html>

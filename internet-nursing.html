<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>互联网+护理服务</title>
    <link rel="stylesheet" href="./portal.css" />
    <script src="./auth.js"></script>
    <script>window.HealthCityAuth.requireRole(["commission", "institution", "citizen", "county"])</script>
  </head>
  <body>
    <main class="portal-shell">
      <header class="portal-header">
        <div>
          <span>互联网+护理服务</span>
          <h1>预约申请、医院派单、护士接单闭环</h1>
          <p>辽宁试点流程：线上申请、首诊评估、知情同意、合格护士派单、上门服务轨迹、护理记录和质量回访。</p>
        </div>
        <nav>
          <a href="./citizen.html">个人端</a>
          <a href="./institution.html">医院端</a>
          <a href="./health-city.html">总览</a>
          <a href="./about.html">关于</a>
        </nav>
      </header>

      <section class="metric-grid" id="nursing-metrics"></section>
      <div id="nursing-operation-message" class="auth-bar" role="status" aria-live="polite" hidden></div>

      <section class="portal-grid">
        <article class="panel wide">
          <div class="panel-title">
            <h2>风险处置提示</h2>
            <span id="nursing-risk-summary"></span>
          </div>
          <div id="nursing-risk-guidance" class="rules"></div>
        </article>
      </section>

      <section class="nursing-mobile-workbench" aria-label="互联网护理手机端工作区">
        <article class="panel nursing-mobile-panel" data-mobile-surface="citizen-appointment">
          <div class="panel-title">
            <h2>手机端预约</h2>
            <span>居民提交</span>
          </div>
          <div id="nursing-mobile-appointment" class="nursing-mobile-card-list"></div>
          <a class="primary-button nursing-mobile-submit" href="#nursing-appointment-form">填写预约</a>
        </article>
        <article class="panel nursing-mobile-panel" data-mobile-surface="nurse-response">
          <div class="panel-title">
            <h2>手机端接单</h2>
            <span>护士响应</span>
          </div>
          <div id="nursing-nurse-mobile" class="nursing-mobile-card-list"></div>
        </article>
      </section>

      <section class="portal-grid">
        <article class="panel nursing-mobile-appointment">
          <div class="panel-title">
            <h2>个人端预约</h2>
            <span id="nursing-citizen-summary"></span>
          </div>
          <form id="nursing-appointment-form" class="filter-grid">
            <label>居民 ID<input name="residentId" value="r1" /></label>
            <label>服务机构<select name="institutionId" id="nursing-institution-select"></select></label>
            <label>服务项目
              <select name="serviceItem">
                <option value="vital signs measurement">生命体征测量</option>
                <option value="blood glucose measurement">血糖测量</option>
                <option value="wound care">伤口护理</option>
                <option value="tube care">管路护理</option>
                <option value="postpartum care">产后护理</option>
                <option value="infant care">婴幼儿护理</option>
                <option value="PICC maintenance">PICC 维护</option>
              </select>
            </label>
            <label>服务对象
              <select name="serviceObject">
                <option value="elderly or disabled people">老年人或失能人群</option>
                <option value="rehabilitation patient">康复期患者</option>
                <option value="terminal-stage patient">终末期患者</option>
                <option value="maternal and infant people">母婴人群</option>
                <option value="mobility-limited chronic disease patient">行动不便慢病患者</option>
              </select>
            </label>
            <label>预约日期<input name="preferredAt" type="date" /></label>
            <label>风险等级
              <select name="riskLevel">
                <option value="medium">中风险</option>
                <option value="low">低风险</option>
                <option value="high">高风险</option>
              </select>
            </label>
            <label class="full">服务地址<input name="address" value="中山区示例地址" /></label>
            <label class="full">护理需求<input name="note" value="居民端提交上门护理预约" /></label>
            <button class="inline-action" type="submit">提交预约</button>
          </form>
        </article>

        <article class="panel wide">
          <div class="panel-title">
            <h2>医院端管理</h2>
            <span>评估 / 知情同意 / 派单</span>
          </div>
          <div id="nursing-orders" class="table-wrap nursing-desktop-table"></div>
        </article>
      </section>

      <section class="portal-grid">
        <article class="panel wide">
          <div class="panel-title">
            <h2>护士端接单</h2>
            <span id="nursing-nurse-summary"></span>
          </div>
          <div class="filter-grid">
            <label>护士<select id="nursing-nurse-select"></select></label>
          </div>
          <div id="nursing-nurse-queue" class="table-wrap nursing-desktop-table"></div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>政策与风控</h2>
            <span id="nursing-policy-summary"></span>
          </div>
          <div id="nursing-policy" class="rules"></div>
        </article>
      </section>
    </main>

    <script src="./shared.js"></script>
    <script src="./internet-nursing.js"></script>
  </body>
</html>

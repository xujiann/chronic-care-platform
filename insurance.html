<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>医保管理与经办 · 支付审核</title>
    <link rel="stylesheet" href="./portal.css" />
    <script src="./auth.js"></script>
    <script>window.HealthCityAuth.requireRole(["insurance"])</script>
  </head>
  <body>
    <main class="portal-shell">
      <header class="portal-header">
        <div>
          <span>医保管理与经办</span>
          <h1>医保支付、经办审核与基金监管</h1>
          <p>区分大连市医保局、大连市医保中心和区市县医保局职责，围绕慢病待遇、结算经办、固定取药和基金风险进行协同审核。</p>
        </div>
        <nav>
          <a href="./drug-consumable-about.html">药耗政策说明</a>
          <a href="./health-city.html">系统总览</a>
        </nav>
      </header>

      <section class="panel">
        <div class="panel-title">
          <h2>当前医保机构</h2>
          <span id="insurance-org-type"></span>
        </div>
        <div id="insurance-org-scope" class="rules"></div>
      </section>

      <section class="metric-grid" id="insurance-metrics"></section>

      <section class="panel" id="drug-consumable-panel">
        <div class="panel-title">
          <h2>药品耗材与合理用药监管</h2>
          <span id="drug-consumable-count"></span>
        </div>
        <div id="drug-consumable-boundaries" class="rules"></div>
        <div id="drug-consumable-list" class="list"></div>
      </section>

      <section class="portal-grid">
        <article class="panel wide">
          <div class="panel-title">
            <h2>结算审核队列</h2>
            <span id="claim-count"></span>
          </div>
          <div id="claim-list" class="list"></div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>控费规则</h2>
          </div>
          <div class="rules">
          <div><strong>大连市医保局</strong><span>负责政策、待遇、基金监管和跨区县监督。</span></div>
          <div><strong>大连市医保中心</strong><span>负责结算经办、凭证核验、固定取药审核和经办留痕。</span></div>
          <div><strong>区市县医保局</strong><span>负责本区机构监管、慢病待遇协同和基层医保服务监督。</span></div>
          </div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>医疗机构监管</h2>
          <span id="supervision-count"></span>
        </div>
        <div id="supervision-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>分级诊疗支付引导</h2>
          <span id="referral-payment-count"></span>
        </div>
        <div id="referral-payment-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>固定取药审核</h2>
          <span id="pickup-audit-count"></span>
        </div>
        <div id="pickup-audit-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>医保凭证核验</h2>
          <span id="credential-check-count"></span>
        </div>
        <div id="credential-check-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>审核留痕</h2>
          <span id="insurance-audit-count"></span>
        </div>
        <div id="insurance-audit" class="list"></div>
      </section>
    </main>

    <script src="./shared.js"></script>
    <script src="./insurance.js"></script>
  </body>
</html>

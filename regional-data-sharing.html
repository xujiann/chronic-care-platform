<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>区域诊疗数据共享平台</title>
    <link rel="stylesheet" href="./portal.css" />
    <script src="./auth.js"></script>
    <script>window.HealthCityAuth.requireRole(["commission", "institution"])</script>
  </head>
  <body>
    <main class="portal-shell">
      <header class="portal-header">
        <div>
          <span>区域诊疗数据共享平台</span>
          <h1>共享包调阅、互认确认与审计闭环</h1>
          <p>复用居民主索引、个人健康档案、诊断报告、互认记录和接口契约，支撑管理端监管与机构端按授权调阅。</p>
        </div>
        <nav>
          <a href="./platform.html">全民健康平台</a>
          <a href="./health-city.html">系统总览</a>
          <a href="./regional-data-sharing-about.html">关于区域共享</a>
          <a href="./institution.html">机构端</a>
          <a href="./workbench.html">工作台</a>
        </nav>
      </header>

      <section class="metric-grid" id="regional-sharing-metrics"></section>

      <section class="portal-grid">
        <article class="panel wide">
          <div class="panel-title">
            <h2>闭环进度</h2>
            <span id="regional-loop-summary"></span>
          </div>
          <div id="regional-sharing-loop" class="regional-loop"></div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>当前共享包</h2>
            <span id="regional-selected-package-status"></span>
          </div>
          <div id="regional-selected-package" class="regional-selected-package"></div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>联调检查</h2>
            <span id="regional-readiness-summary"></span>
          </div>
          <div id="regional-readiness-checklist" class="regional-readiness-checklist"></div>
        </article>
      </section>

      <section class="portal-grid">
        <article class="panel wide">
          <div class="panel-title">
            <h2>共享包队列</h2>
            <span id="regional-sharing-scope"></span>
          </div>
          <div class="filter-grid">
            <label>
              状态
              <select id="regional-status-filter">
                <option value="">全部</option>
                <option value="ready">可共享</option>
                <option value="pending_review">待复核</option>
                <option value="blocked">暂缓共享</option>
              </select>
            </label>
            <label>
              机构/居民
              <input id="regional-keyword-filter" placeholder="输入机构、居民或共享包名称" />
            </label>
          </div>
          <div id="regional-sharing-packages" class="priority-list"></div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>边界与复用</h2>
            <span>应用 1</span>
          </div>
          <div id="regional-sharing-boundary" class="rules"></div>
        </article>
      </section>

      <section class="portal-grid">
        <article class="panel wide">
          <div class="panel-title">
            <h2>调阅审计</h2>
            <span>按包登记访问目的、结论和处理说明</span>
          </div>
          <form id="regional-access-form" class="filter-grid">
            <label>
              共享包
              <select name="packageId" required></select>
            </label>
            <label>
              结论
              <select name="decision">
                <option value="approved">已调阅</option>
                <option value="denied">暂不调阅</option>
              </select>
            </label>
            <label class="full">
              目的
              <input name="purpose" required value="本次诊疗所需的区域诊疗数据调阅" />
            </label>
            <label class="full">
              说明
              <textarea name="note" rows="3" placeholder="登记接诊、互认、复核或问题闭环说明"></textarea>
            </label>
            <button class="primary-button" type="submit">登记留痕</button>
          </form>
          <div id="regional-access-feedback" class="regional-access-feedback muted"></div>
          <div id="regional-sharing-reviews" class="priority-list"></div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>状态规范</h2>
            <span>静态快照字段</span>
          </div>
          <div id="regional-sharing-snapshots" class="rules"></div>
        </article>
      </section>
    </main>

    <script src="./shared.js"></script>
    <script src="./regional-data-sharing.js?v=20260625-readiness"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 · 健康城市协同系统</title>
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body data-auth-page="login">
    <main class="portal-shell login-shell">
      <section class="login-layout">
        <article class="login-intro">
          <span>健康城市统一认证</span>
          <h1>按组织和角色进入协同系统</h1>
          <p>本地服务运行时，登录会签发后端会话令牌并写入安全审计；静态预览时自动降级为前端演示会话。真实部署可继续接入政务统一身份认证、电子健康码、医保电子凭证、短信验证、CA 证书和人脸核验。</p>
          <div class="login-flow">
            <div><strong>1</strong><span>身份识别</span></div>
            <div><strong>2</strong><span>组织定位</span></div>
            <div><strong>3</strong><span>角色授权</span></div>
            <div><strong>4</strong><span>访问留痕</span></div>
          </div>
        </article>

        <article class="panel login-panel">
          <div class="panel-title">
            <h2>登录</h2>
            <span>密码 123456 · 居民验证码 888888</span>
          </div>
          <div class="login-method-tabs" role="tablist" aria-label="登录方式">
            <button type="button" class="active" data-login-method="account" role="tab" aria-selected="true">账号密码</button>
            <button type="button" data-login-method="phone" role="tab" aria-selected="false">手机号验证码</button>
          </div>
          <form id="login-form" class="login-form">
            <label>账号
              <select name="username" id="login-user"></select>
            </label>
            <label>密码
              <input name="password" type="password" value="123456" autocomplete="current-password" required />
            </label>
            <button class="primary-action" type="submit">进入系统</button>
            <p class="login-error" id="login-error" role="alert"></p>
          </form>
          <form id="phone-login-form" class="login-form" hidden>
            <label>手机号
              <input name="phone" id="login-phone" value="DEMO-MOBILE-R1" autocomplete="tel" required />
            </label>
            <label>验证码
              <span class="phone-code-row">
                <input name="code" id="login-phone-code" inputmode="numeric" value="888888" maxlength="6" autocomplete="one-time-code" required />
                <button type="button" data-send-phone-code>获取验证码</button>
              </span>
            </label>
            <p class="login-hint" id="phone-code-hint">演示环境可发送验证码，也可使用 888888。</p>
            <button class="primary-action" type="submit">居民手机号登录</button>
            <p class="login-error" id="phone-login-error" role="alert"></p>
          </form>
          <div class="demo-accounts" id="demo-accounts"></div>
        </article>
      </section>
    </main>

    <script src="./auth.js"></script>
    <script>
      const select = document.querySelector("#login-user");
      const accounts = window.HealthCityAuth.demoUsers;
      const phoneForm = document.querySelector("#phone-login-form");
      const accountForm = document.querySelector("#login-form");
      const sendPhoneCodeButton = document.querySelector("[data-send-phone-code]");
      const phoneCodeHint = document.querySelector("#phone-code-hint");
      let phoneCodeTimer = 0;
      select.innerHTML = accounts.map((user) => `<option value="${user.username}">${user.roleName} · ${user.orgName || user.name} · ${user.username}</option>`).join("");
      document.querySelector("#demo-accounts").innerHTML = accounts.map((user) => `<button type="button" data-user="${user.username}">
        <strong>${user.roleName}</strong>
        <span>${user.orgName || user.name}<br>${user.username} / 123456${user.phone ? `<br>${user.phone} / ${window.HealthCityAuth.demoSmsCode}` : ""}<br>${user.dataScope || ""}</span>
      </button>`).join("");
      document.querySelectorAll("[data-login-method]").forEach((button) => {
        button.addEventListener("click", () => {
          const isPhone = button.dataset.loginMethod === "phone";
          document.querySelectorAll("[data-login-method]").forEach((item) => {
            item.classList.toggle("active", item === button);
            item.setAttribute("aria-selected", String(item === button));
          });
          accountForm.hidden = isPhone;
          phoneForm.hidden = !isPhone;
        });
      });
      document.querySelectorAll("[data-user]").forEach((button) => {
        button.addEventListener("click", () => {
          select.value = button.dataset.user;
          document.querySelector("[name='password']").value = "123456";
          const user = accounts.find((item) => item.username === button.dataset.user);
          if (user?.phone) document.querySelector("#login-phone").value = user.phone;
        });
      });
      function setPhoneCodeCooldown(seconds) {
        window.clearInterval(phoneCodeTimer);
        let remaining = Number(seconds || 0);
        const render = () => {
          if (remaining <= 0) {
            sendPhoneCodeButton.disabled = false;
            sendPhoneCodeButton.textContent = "获取验证码";
            window.clearInterval(phoneCodeTimer);
            return;
          }
          sendPhoneCodeButton.disabled = true;
          sendPhoneCodeButton.textContent = `${remaining}秒`;
          remaining -= 1;
        };
        render();
        phoneCodeTimer = window.setInterval(render, 1000);
      }
      sendPhoneCodeButton.addEventListener("click", async () => {
        const phone = document.querySelector("#login-phone").value;
        sendPhoneCodeButton.disabled = true;
        sendPhoneCodeButton.textContent = "发送中";
        const result = await window.HealthCityAuth.sendPhoneCode(phone);
        if (!result.ok) {
          phoneCodeHint.textContent = result.message || "验证码发送失败";
          setPhoneCodeCooldown(result.retryAfterSeconds || 5);
          return;
        }
        if (result.demoCode) document.querySelector("#login-phone-code").value = result.demoCode;
        const expiresAt = result.expiresAt ? new Date(result.expiresAt).toLocaleTimeString("zh-CN", { hour12: false }) : "5分钟内";
        phoneCodeHint.textContent = `验证码已发送至 ${result.phone || phone}，${expiresAt} 前有效。`;
        setPhoneCodeCooldown(result.retryAfterSeconds || 60);
      });
      document.querySelector("#login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const submitButton = event.currentTarget.querySelector("button[type='submit']");
        const data = Object.fromEntries(new FormData(event.currentTarget));
        submitButton.disabled = true;
        submitButton.textContent = "登录中";
        const result = await window.HealthCityAuth.login(data.username, data.password);
        submitButton.disabled = false;
        submitButton.textContent = "进入系统";
        if (!result.ok) {
          document.querySelector("#login-error").textContent = result.message;
          return;
        }
        window.HealthCityAuth.redirectAfterLogin(result.user.home);
      });
      phoneForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const submitButton = event.currentTarget.querySelector("button[type='submit']");
        const data = Object.fromEntries(new FormData(event.currentTarget));
        submitButton.disabled = true;
        submitButton.textContent = "登录中";
        const result = await window.HealthCityAuth.loginByPhone(data.phone, data.code);
        submitButton.disabled = false;
        submitButton.textContent = "居民手机号登录";
        if (!result.ok) {
          document.querySelector("#phone-login-error").textContent = result.message;
          return;
        }
        window.HealthCityAuth.redirectAfterLogin(result.user.home);
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 · 健康城市四端协同系统</title>
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body data-auth-page="login">
    <main class="portal-shell login-shell">
      <section class="login-layout">
        <article class="login-intro">
          <span>健康城市统一认证</span>
          <h1>按角色进入四端协同系统</h1>
          <p>当前为开源 MVP 演示登录。真实部署时应接入政务统一身份认证、电子健康码、医保电子凭证、短信/人脸核验和后端权限审计。</p>
          <div class="login-flow">
            <div><strong>1</strong><span>身份识别</span></div>
            <div><strong>2</strong><span>角色授权</span></div>
            <div><strong>3</strong><span>进入端系统</span></div>
            <div><strong>4</strong><span>访问留痕</span></div>
          </div>
        </article>

        <article class="panel login-panel">
          <div class="panel-title">
            <h2>登录</h2>
            <span>演示密码均为 123456</span>
          </div>
          <form id="login-form" class="login-form">
            <label>账号
              <select name="username" id="login-user"></select>
            </label>
            <label>密码
              <input name="password" type="password" value="123456" autocomplete="current-password" required />
            </label>
            <button class="primary-action" type="submit">进入系统</button>
            <p class="login-error" id="login-error" role="alert"></p>
          </form>
          <div class="demo-accounts" id="demo-accounts"></div>
        </article>
      </section>
    </main>

    <script src="./auth.js"></script>
    <script>
      const select = document.querySelector("#login-user");
      const accounts = window.HealthCityAuth.demoUsers;
      select.innerHTML = accounts.map((user) => `<option value="${user.username}">${user.roleName} · ${user.name} · ${user.username}</option>`).join("");
      document.querySelector("#demo-accounts").innerHTML = accounts.map((user) => `<button type="button" data-user="${user.username}">
        <strong>${user.roleName}</strong>
        <span>${user.username} / 123456</span>
      </button>`).join("");
      document.querySelectorAll("[data-user]").forEach((button) => {
        button.addEventListener("click", () => {
          select.value = button.dataset.user;
          document.querySelector("[name='password']").value = "123456";
        });
      });
      document.querySelector("#login-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(event.currentTarget));
        const result = window.HealthCityAuth.login(data.username, data.password);
        if (!result.ok) {
          document.querySelector("#login-error").textContent = result.message;
          return;
        }
        window.HealthCityAuth.redirectAfterLogin(result.user.home);
      });
    </script>
  </body>
</html>
